name: luminalib
version: '3.8'
services:
  api:
    build: .
    container_name: luminalib_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - minio
      - redis
      - mock_llm
    volumes:
      - ./app:/code/app

  db:
    image: postgres:15
    container_name: luminalib_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: luminalib_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: luminalib_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data

  mock_llm:
    build: ./infra/mock_llm
    container_name: luminalib_mock_llm
    env_file:
      - .env
    ports:
      - "5100:5100"

  worker:
    build: .
    container_name: luminalib_worker
    command: sh -c "ruff check app --fix && black app && celery -A app.tasks.celery_app.celery worker -Q lumina --loglevel=info"
    env_file:
      - .env
    depends_on:
      - api
      - redis
      - db
      - minio
      - mock_llm
    volumes:
      - ./app:/code/app

volumes:
  db_data:
  minio_data:
